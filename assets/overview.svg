<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ClaimPilot AI overview</title>
  <desc id="desc">A flow diagram showing upload, vision analysis, and repair estimate output.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17142D"/>
      <stop offset="1" stop-color="#2B2552"/>
    </linearGradient>
    <linearGradient id="accent" x1="120" y1="120" x2="1080" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00F5D4"/>
      <stop offset="0.5" stop-color="#00D4FF"/>
      <stop offset="1" stop-color="#FFE600"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1200" height="420" rx="32" fill="url(#bg)"/>
  <circle cx="132" cy="88" r="72" fill="#00F5D4" fill-opacity="0.08"/>
  <circle cx="1064" cy="334" r="96" fill="#FFE600" fill-opacity="0.06"/>
  <rect x="74" y="66" width="1052" height="288" rx="28" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.08"/>

  <g filter="url(#shadow)">
    <rect x="116" y="146" width="210" height="120" rx="22" fill="#2F2A5A" stroke="url(#accent)" stroke-width="2"/>
    <rect x="495" y="146" width="210" height="120" rx="22" fill="#2F2A5A" stroke="url(#accent)" stroke-width="2"/>
    <rect x="874" y="146" width="210" height="120" rx="22" fill="#2F2A5A" stroke="url(#accent)" stroke-width="2"/>
  </g>

  <path d="M350 206H475" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M728 206H853" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <path d="M412 206L395 196V216L412 206Z" fill="#00F5D4"/>
  <path d="M790 206L773 196V216L790 206Z" fill="#00F5D4"/>

  <text x="221" y="188" text-anchor="middle" fill="#F4F7FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="700">Upload Car Image</text>
  <text x="221" y="226" text-anchor="middle" fill="#AEB6E8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Single vehicle photo</text>

  <text x="600" y="182" text-anchor="middle" fill="#F4F7FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Vision AI Analysis</text>
  <text x="600" y="220" text-anchor="middle" fill="#AEB6E8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Damage detection + fraud cues</text>

  <text x="979" y="182" text-anchor="middle" fill="#F4F7FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Repair Estimate</text>
  <text x="979" y="220" text-anchor="middle" fill="#AEB6E8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Structured JSON in PKR</text>

  <text x="600" y="103" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="36" font-weight="800" letter-spacing="0.5">ClaimPilot AI</text>
  <text x="600" y="370" text-anchor="middle" fill="#C7CBE8" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18">Vision-based vehicle damage assessment workflow</text>
</svg>
